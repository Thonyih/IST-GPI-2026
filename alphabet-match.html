<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alphabet Match App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/alphabet-app.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="quiz-page quiz-alphabet">
  <main class="quiz-shell">
    <a class="back-link" href="index.html">← Back to Games</a>
    <section class="quiz-header">
      <div class="hero-bubble">🔤</div>
      <h1>Alphabet Match App</h1>
      <p>Look at the letter and pick the matching picture.</p>
    </section>

    <section class="quiz-panel" data-quiz="alphabet">
      <div class="quiz-topline">
        <span id="alphabet-progress">Question 1 of 3</span>
        <span id="alphabet-score">Score: 0</span>
      </div>
      <div id="alphabet-visual" class="question-visual"></div>
      <h2 id="alphabet-question">Loading question...</h2>
      <div id="alphabet-answers" class="answers"></div>
      <p id="alphabet-feedback" class="feedback" aria-live="polite"></p>
      <button id="alphabet-next" class="next-button" type="button">Next Question</button>
      <button id="alphabet-restart" class="restart-button" type="button">Play Again</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
