<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numbers Counting App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="quiz-page quiz-numbers">
  <main class="quiz-shell">
    <a class="back-link" href="index.html">← Back to Games</a>
    <section class="quiz-header">
      <div class="hero-bubble">🔢</div>
      <h1>Numbers Counting App</h1>
      <p>Count the objects and choose the right number.</p>
    </section>

    <section class="quiz-panel" data-quiz="numbers">
      <div class="quiz-topline">
        <span id="numbers-progress">Question 1 of 3</span>
        <span id="numbers-score">Score: 0</span>
      </div>
      <div id="numbers-visual" class="question-visual"></div>
      <h2 id="numbers-question">Loading question...</h2>
      <div id="numbers-answers" class="answers"></div>
      <p id="numbers-feedback" class="feedback" aria-live="polite"></p>
      <button id="numbers-next" class="next-button" type="button">Next Question</button>
      <button id="numbers-restart" class="restart-button" type="button">Play Again</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
