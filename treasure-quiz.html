<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treasure Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="quiz-page quiz-treasure">
  <main class="quiz-shell">
    <a class="back-link" href="index.html">← Back to Games</a>
    <section class="quiz-header">
      <div class="hero-bubble">🗺️</div>
      <h1>Treasure Quiz</h1>
      <p>Find the hidden treasure by answering three fun questions.</p>
    </section>

    <section class="quiz-panel" data-quiz="treasure">
      <div class="quiz-topline">
        <span id="treasure-progress">Question 1 of 3</span>
        <span id="treasure-score">Score: 0</span>
      </div>
      <h2 id="treasure-question">Loading question...</h2>
      <div id="treasure-answers" class="answers"></div>
      <p id="treasure-feedback" class="feedback" aria-live="polite"></p>
      <button id="treasure-next" class="next-button" type="button">Next Question</button>
      <button id="treasure-restart" class="restart-button" type="button">Play Again</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
